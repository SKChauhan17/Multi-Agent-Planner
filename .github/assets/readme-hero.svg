<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="460" viewBox="0 0 1600 460" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Agent Planner</title>
  <desc id="desc">A warm editorial hero banner for the Multi-Agent Planner project.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f4ed"/>
      <stop offset="100%" stop-color="#ece8dc"/>
    </linearGradient>

    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c96442"/>
      <stop offset="100%" stop-color="#d97757"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="460" fill="url(#bg)"/>

  <circle cx="1450" cy="60" r="120" fill="#c96442" opacity="0.13" filter="url(#soft)"/>
  <circle cx="1320" cy="380" r="150" fill="#4d4c48" opacity="0.09" filter="url(#soft)"/>
  <circle cx="180" cy="70" r="95" fill="#d97757" opacity="0.10" filter="url(#soft)"/>

  <rect x="72" y="58" width="1456" height="344" rx="28" fill="#faf9f5" opacity="0.94"/>
  <rect x="72" y="58" width="1456" height="344" rx="28" fill="none" stroke="#e8e6dc" stroke-width="2"/>

  <rect x="116" y="108" width="220" height="42" rx="21" fill="url(#chip)"/>
  <text x="226" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#faf9f5" letter-spacing="1.2">
    EDITORIAL AI
  </text>

  <text x="116" y="214" font-family="Georgia, serif" font-size="64" fill="#141413">
    Multi-Agent Planner
  </text>

  <text x="116" y="258" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#5e5d59">
    Plan smarter. Review harder. Execute with clarity.
  </text>

  <line x1="116" y1="286" x2="632" y2="286" stroke="#d1cfc5" stroke-width="2"/>

  <g transform="translate(116 318)">
    <rect x="0" y="0" width="220" height="44" rx="12" fill="#141413"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#faf9f5" font-weight="600">
      Next.js + FastAPI + SQLite
    </text>
  </g>

  <g transform="translate(356 318)">
    <rect x="0" y="0" width="220" height="44" rx="12" fill="#e8e6dc"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#4d4c48" font-weight="600">
      Editable Plans + Standups
    </text>
  </g>

  <g transform="translate(596 318)">
    <rect x="0" y="0" width="220" height="44" rx="12" fill="#e8e6dc"/>
    <text x="110" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#4d4c48" font-weight="600">
      Model Fallback Reliability
    </text>
  </g>
</svg>
